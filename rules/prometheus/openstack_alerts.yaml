groups:
- name: openstack-system
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Instances {{ $labels.instance }} is DOWN"

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "CPU is high on {{ $labels.instance }}: {{ $value }}%"

  - alert: HighMemoryUsage
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Memory RAM is high on {{ $labels.instance }}: {{ $value }}%"
  
  - alert: HighDiskUsage
    expr: (1 - (node_filesystem_avail_bytes{fstype="ext4"} / node_filesystem_size_bytes{fstype="ext4"})) * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Disk usage is high on {{ $labels.instance }} mount {{ $labels.mountpoint }}: {{ $value | printf \"%.1f\" }}%"



