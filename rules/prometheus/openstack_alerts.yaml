groups:
- name: openstack-system
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Instances {{ $labels.instance }} is DOWN"

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "CPU is high on {{ $labels.instance }}: {{ $value }}%"

  - alert: HighMemoryUsage
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Memory RAM is high on {{ $labels.instance }}: {{ $value }}%"
  
  - alert: HighDiskUsage
    expr: (1 - (node_filesystem_avail_bytes{fstype="ext4"} / node_filesystem_size_bytes{fstype="ext4"})) * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Disk usage is high on {{ $labels.instance }} mount {{ $labels.mountpoint }}: {{ $value | printf \"%.1f\" }}%"

- name: nginx
  rules:
  - alert: NginxDown
    expr: nginx_up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Nginx is DOWN on {{ $labels.instance }}"

  - alert: NginxHighConnections
    expr: nginx_connections_active > 1000
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Nginx high active connections on {{ $labels.instance }}: {{ $value }}"

  - alert: NginxHighRequestRate
    expr: rate(nginx_http_requests_total[5m]) > 500
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Nginx high request rate on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }} req/s"

  - alert: NginxHighErrorRate
    expr: rate(nginx_connections_accepted[5m]) > 0 and (rate(nginx_connections_accepted[5m]) - rate(nginx_connections_handled[5m])) / rate(nginx_connections_accepted[5m]) * 100 > 5
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Nginx dropping connections on {{ $labels.instance }}: {{ $value | printf \"%.1f\" }}%"


